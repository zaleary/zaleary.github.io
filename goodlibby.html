---
layout: none
permalink: /goodlibby/
---
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoodLibby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Spectral:wght@400;500&display=swap" />
  <style>
    :root {
      --bg: #f4f1f7;
      --ink: #1b1b1b;
      --muted: #6b655d;
      --accent: #6d4aa5;
      --card: #fbf9f6;
      --shadow: rgba(22, 18, 12, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(60rem 40rem at -10% -10%, #ede6f4 0%, transparent 60%),
        radial-gradient(50rem 30rem at 110% 20%, #f3eef8 0%, transparent 55%),
        var(--bg);
      color: var(--ink);
      font-family: "Spectral", "Iowan Old Style", "Palatino", serif;
      min-height: 100svh;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    .container.wide {
      max-width: 640px;
    }

    h1 {
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      font-size: clamp(2.2rem, 5vw, 3rem);
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }

    /* ── Form ── */

    .card {
      background: var(--card);
      border: 1px solid rgba(27, 27, 27, 0.08);
      border-radius: 16px;
      padding: 1.8rem;
      box-shadow: 0 4px 24px var(--shadow);
    }

    .field { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input[type="file"],
    input[type="text"] {
      width: 100%;
      padding: 0.55rem 0.8rem;
      border: 1px solid rgba(27, 27, 27, 0.2);
      border-radius: 8px;
      font-family: "Spectral", serif;
      font-size: 1rem;
      background: white;
      color: var(--ink);
      transition: border-color 150ms ease;
    }

    input:focus { outline: none; border-color: var(--accent); }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.4rem;
      line-height: 1.4;
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: #b91c1c;
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
    }

    button.primary {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 150ms ease;
    }

    button.primary:hover { opacity: 0.9; }
    button.primary:disabled { opacity: 0.55; cursor: default; }

    /* ── Results ── */

    .back {
      display: inline-block;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid rgba(107, 101, 93, 0.3);
      padding-bottom: 1px;
      margin-bottom: 1rem;
      cursor: pointer;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      transition: color 150ms ease, border-color 150ms ease;
    }

    .back:hover { color: var(--accent); border-color: var(--accent); }

    .book-list { display: grid; gap: 1rem; }

    .book-card {
      background: var(--card);
      border: 1px solid rgba(27, 27, 27, 0.08);
      border-radius: 16px;
      padding: 1.2rem 1.4rem;
      box-shadow: 0 2px 12px var(--shadow);
      animation: float-in 400ms ease-out both;
    }

    @keyframes float-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .book-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.15rem;
    }

    .book-author {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.9rem;
    }

    .lib-block {
      border-top: 1px solid rgba(27, 27, 27, 0.06);
      padding: 0.5rem 0 0.25rem;
    }

    .lib-name {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .format-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.9rem;
      padding: 0.15rem 0;
      gap: 1rem;
    }

    .format-label { color: var(--ink); }

    .format-label a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(27, 27, 27, 0.25);
      padding-bottom: 1px;
      transition: color 150ms ease, border-color 150ms ease;
    }

    .format-label a:hover { color: var(--accent); border-color: var(--accent); }

    .status {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .s-available   { color: #16a34a; font-weight: 600; }
    .s-waitlist    { color: #b45309; }
    .s-unavailable { color: #9ca3af; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <!-- Input view -->
  <div id="view-input" class="container">
    <h1>GoodLibby</h1>
    <p class="subtitle">Check your Goodreads to-read list against Libby.</p>
    <div id="error-box" class="error-msg" hidden></div>
    <div class="card">
      <div class="field">
        <label for="csv-file">Goodreads export CSV</label>
        <input type="file" id="csv-file" accept=".csv" />
        <p class="hint">Goodreads → My Books → Import and Export → Export Library.</p>
      </div>
      <div class="field">
        <label for="libraries">Library slugs</label>
        <input type="text" id="libraries" placeholder="sfpl, aclibrary, dod" />
        <p class="hint">
          Find yours at <strong>libbyapp.com/library/&lt;slug&gt;</strong>.
          Separate multiple with commas.
        </p>
      </div>
      <button class="primary" id="check-btn">Check availability</button>
    </div>
  </div>

  <!-- Results view -->
  <div id="view-results" class="container wide" hidden>
    <button class="back" id="back-btn">← Check another list</button>
    <h1>GoodLibby</h1>
    <p class="subtitle" id="status-text">Starting…</p>
    <div class="book-list" id="results-list"></div>
  </div>

  <script>
    // ── Utilities ────────────────────────────────────────────────────────────

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // ── CSV parsing ──────────────────────────────────────────────────────────

    function parseCSVRow(line) {
      const cells = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (c === ',' && !inQ) {
          cells.push(cur); cur = '';
        } else {
          cur += c;
        }
      }
      cells.push(cur);
      return cells;
    }

    function getToReadBooks(text) {
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
      const lines = text.split(/\r?\n/);
      const headers = parseCSVRow(lines[0]);
      const books = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const vals = parseCSVRow(lines[i]);
        const row = Object.fromEntries(headers.map((h, j) => [h, vals[j] || '']));
        const shelves = (row['Bookshelves'] || '').split(',').map(s => s.trim());
        if (!shelves.includes('to-read')) continue;
        const title = (row['Title'] || '').replace(/\s*\(.*?\)/g, '').trim();
        const author = (row['Author'] || '').trim();
        if (title && author) books.push({ title, author });
      }
      return books;
    }

    // ── OverDrive API ────────────────────────────────────────────────────────

    const API = 'https://thunder.api.overdrive.com/v2';

    async function fetchMedia(slug, title, author, format, types) {
      try {
        const params = new URLSearchParams({
          query: `${title} ${author}`, format, limit: 5, sort: 'relevance'
        });
        const res = await fetch(`${API}/libraries/${slug}/media?${params}`, {
          headers: { Accept: 'application/json' }
        });
        if (!res.ok) return null;
        const data = await res.json();
        const items = (data.items || []).filter(item => {
          if (!types.includes(item.type?.id)) return false;
          const langs = item.languages || [];
          return langs.length === 0 || langs.some(l => (l.id || '').startsWith('en'));
        });
        const tl = title.toLowerCase();
        const sig = new Set(tl.split(' ').filter(w => w.length > 3));
        // Pass 1: substring
        const p1 = items.find(it => (it.title || '').toLowerCase().includes(tl));
        if (p1) return p1;
        // Pass 2: significant words
        return items.find(it => {
          const rw = new Set((it.title || '').toLowerCase().split(' '));
          return sig.size > 0 && [...sig].every(w => rw.has(w));
        }) || null;
      } catch { return null; }
    }

    function classify(media) {
      const owned = media.ownedCopies || media.copiesOwned || 0;
      const avail = media.availableCopies || media.copiesAvailable || 0;
      const holds = media.holdsCount || media.numberOfHolds || 0;
      if (owned === 0 && !media.isOwned) return { status: 'unavailable', avail: 0, holds: 0 };
      if (media.isAvailable || avail > 0) return { status: 'available', avail, holds };
      return { status: 'waitlist', avail: 0, holds };
    }

    function libbyUrl(slug, title, id) {
      return `https://libbyapp.com/search/${slug}/search/query-${encodeURIComponent(title)}/page-1/${id}`;
    }

    async function checkLibrary(slug, title, author) {
      const [audio, ebook] = await Promise.all([
        fetchMedia(slug, title, author, 'audiobook-mp3,audiobook-overdrive', ['audiobook']),
        fetchMedia(slug, title, author, 'ebook-epub-open,ebook-epub-adobe,ebook-overdrive,ebook-kindle,ebook-kobo', ['ebook'])
      ]);
      return {
        audiobook: audio
          ? { ...classify(audio), url: libbyUrl(slug, title, audio.id || '') }
          : { status: 'unavailable', avail: 0, holds: 0, url: '' },
        ebook: ebook
          ? { ...classify(ebook), url: libbyUrl(slug, title, ebook.id || '') }
          : { status: 'unavailable', avail: 0, holds: 0, url: '' }
      };
    }

    // ── Rendering ────────────────────────────────────────────────────────────

    const LABEL = { available: 'Available now', waitlist: 'Waitlist', unavailable: 'Not available' };

    function statusSpan(fmt) {
      let text = LABEL[fmt.status];
      if (fmt.status === 'available' && fmt.avail) text += ` · ${fmt.avail} available`;
      if (fmt.status === 'waitlist' && fmt.holds) text += ` · ${fmt.holds} holds`;
      return `<span class="status s-${fmt.status}">${text}</span>`;
    }

    function formatLabel(text, url) {
      return url
        ? `<a href="${url}" target="_blank" rel="noreferrer">${text}</a>`
        : text;
    }

    function renderCard(title, author, libResults) {
      const libs = libResults.map(({ slug, audio, ebook }) => `
        <div class="lib-block">
          <div class="lib-name">${slug}</div>
          <div class="format-row">
            <span class="format-label">${formatLabel('Audiobook', audio.url)}</span>
            ${statusSpan(audio)}
          </div>
          <div class="format-row">
            <span class="format-label">${formatLabel('Ebook', ebook.url)}</span>
            ${statusSpan(ebook)}
          </div>
        </div>
      `).join('');

      const card = document.createElement('div');
      card.className = 'book-card';
      card.innerHTML = `
        <div class="book-title">${title}</div>
        <div class="book-author">${author}</div>
        ${libs}
      `;
      document.getElementById('results-list').appendChild(card);
    }

    // ── Main flow ────────────────────────────────────────────────────────────

    async function run(books, slugs) {
      const statusEl = document.getElementById('status-text');

      for (let i = 0; i < books.length; i++) {
        const { title, author } = books[i];
        statusEl.textContent = `Checking ${title} (${i + 1} of ${books.length})…`;

        const libResults = [];
        for (const slug of slugs) {
          const result = await checkLibrary(slug, title, author);
          libResults.push({ slug, ...result });
          await sleep(300);
        }

        renderCard(title, author, libResults);
        await sleep(200);
      }

      statusEl.textContent = `${books.length} book${books.length !== 1 ? 's' : ''} checked.`;
    }

    // ── Event handlers ───────────────────────────────────────────────────────

    document.getElementById('check-btn').addEventListener('click', () => {
      const fileInput = document.getElementById('csv-file');
      const libInput  = document.getElementById('libraries');
      const errorBox  = document.getElementById('error-box');

      errorBox.hidden = true;

      const slugs = libInput.value.split(',').map(s => s.trim()).filter(Boolean);
      if (!fileInput.files.length) {
        errorBox.textContent = 'Please upload a Goodreads CSV export.';
        errorBox.hidden = false;
        return;
      }
      if (!slugs.length) {
        errorBox.textContent = 'Please enter at least one library slug.';
        errorBox.hidden = false;
        return;
      }

      const reader = new FileReader();
      reader.onload = async e => {
        const books = getToReadBooks(e.target.result);
        if (!books.length) {
          errorBox.textContent = "No to-read books found. Make sure the Bookshelves column contains 'to-read'.";
          errorBox.hidden = false;
          return;
        }

        document.getElementById('view-input').hidden = true;
        document.getElementById('view-results').hidden = false;

        await run(books, slugs);
      };
      reader.readAsText(fileInput.files[0]);
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      document.getElementById('results-list').innerHTML = '';
      document.getElementById('view-results').hidden = true;
      document.getElementById('view-input').hidden = false;
    });
  </script>
</body>
</html>
